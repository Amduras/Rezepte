services:
  # 1. Laravel App & PHP-FPM
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: laravel-app
    container_name: laravel_app
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    volumes:
      - ./src:/var/www
    # Ports wurden hier entfernt, da Vite jetzt einen eigenen Container hat!
    networks:
      - app-network

  # 2. Nginx Webserver
  webserver:
    image: nginx:alpine
    container_name: laravel_webserver
    restart: unless-stopped
    tty: true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./src:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network

  # 3. MariaDB Datenbank
  db:
    image: mariadb:10.11
    container_name: laravel_db
    restart: unless-stopped
    tty: true
    environment:
      MYSQL_DATABASE: laravel_db
      MYSQL_USER: laravel_user
      MYSQL_PASSWORD: test_pw
      MYSQL_ROOT_PASSWORD: root_pw
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - app-network

  # 4. NEU: Separater Vite Dev-Server für das Hot-Reloading
  vite:
    image: node:20-alpine
    container_name: laravel_vite
    restart: always
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    # Zwingt Vite, im Host-Modus auf allen IPs zu lauschen
    command: npm run dev -- --host 0.0.0.0
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
