server {
    listen 80;
    server_name _; # Akzeptiert alle Anfragen (localhost, IP, duckdns.org)
    root /var/www/public;

    index index.php index.html;
    client_max_body_size 25M; 

    # Laravel Routing
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM Konfiguration
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        
        # WICHTIG: Forwarded-Header an PHP weitergeben.
        # Wenn sie nicht da sind (z.B. bei lokalem Zugriff), ignoriert Laravel sie einfach.
        # Wenn Caddy sie schickt, liest Laravel sie über TrustProxies aus.
        fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_HOST $http_x_forwarded_host;
        fastcgi_param HTTP_X_FORWARDED_PORT $http_x_forwarded_port;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_PREFIX $http_x_forwarded_prefix;

        include fastcgi_params;
    }

    # Logs (optional)
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}
