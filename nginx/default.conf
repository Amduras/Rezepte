map $http_x_forwarded_proto $fwd_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

map $http_x_forwarded_port $fwd_port {
    default $http_x_forwarded_port;
    ""      $server_port;
}

map $http_x_forwarded_host $fwd_host {
    default $http_x_forwarded_host;
    ""      $host;
}

server {
    listen 80;
    index index.php index.html;
    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
    root /var/www/public; 
    client_max_body_size 20M;

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        
        fastcgi_param HTTP_HOST $host;
        fastcgi_param SERVER_NAME $host;
        fastcgi_param SERVER_PORT $server_port;
        fastcgi_param REQUEST_SCHEME $scheme;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param DOCUMENT_URI $document_uri;
        fastcgi_param DOCUMENT_ROOT $document_root;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        
        fastcgi_param HTTP_X_FORWARDED_PROTO $fwd_proto;
        fastcgi_param HTTP_X_FORWARDED_PORT $fwd_port;
        fastcgi_param HTTP_X_FORWARDED_HOST $fwd_host;
        
        include fastcgi_params;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
        gzip_static on;
    }
}
